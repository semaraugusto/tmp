name: VeriLib Reclone on Merge

on:
  push:
    branches:
      - master

jobs:
  verilib-reclone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install verilib-cli
        run: |
          curl -sSL https://github.com/Beneficial-AI-Foundation/verilib-cli/releases/latest/download/verilib-cli-installer.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Write API key to credentials file
        run: echo -n "${{ secrets.VERILIB_API_KEY }}" > ~/.verilib_credentials

      # - name: Reclone
      #   env:
      #     VERILIB_API_KEY: ${{ secrets.VERILIB_API_KEY }}
      #   run: verilib-cli reclone
      #
      - name: Reclone CURL
        env:
          VERILIB_API_KEY: ${{ secrets.VERILIB_API_KEY }}
          HTTP_ENDPOINT: ${{ secrets.HTTP_ENDPOINT }}
        run: |
          curl -sS -X POST "$HTTP_ENDPOINT" \
            -H "Authorization: ApiKey $VERILIB_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}'
